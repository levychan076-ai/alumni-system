<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alumni Login - Alumni Tracking System</title>
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>

<div class="login-wrapper">

    <div class="login-card">

        <!-- LOGO + TITLE -->
        <div class="login-header">
            <img src="{{ url_for('static', filename='images/PNG (transparent background).png') }}" alt="NEUST Logo" class="logo">
            <div class="login-title-block">
                <span class="login-school">Nueva Ecija University of Science and Technology</span>
                <span class="login-subtitle">Talavera Academic Extension Campus</span>
                <h1 class="login-system-title">Alumni<br>Login Portal</h1>
            </div>
        </div>

        <div class="login-divider"></div>

        <!-- LOGIN FORM -->
        <form method="POST" action="/login-alumni">
            {% if error %}
            <div class="error-message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <div class="field-group">
                <label class="field-label">Email Address</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input type="email" name="alumni_email" class="field-input" placeholder="Enter your email address" required>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Password</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" name="alumni_password" class="field-input" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                </svg>
                Login
            </button>

            <div class="register-link">
                Don't have an account? <a href="/register">Create Account</a>
            </div>
        </form>

    </div>
</div>

</body>
</html>
