<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin & Coordinator Login - Alumni Tracking System</title>
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>

<div class="login-wrapper">

    <div class="login-card">

        <!-- LOGO + TITLE -->
        <div class="login-header">
            <img src="{{ url_for('static', filename='images/PNG (transparent background).png') }}" alt="NEUST Logo" class="logo">
            <div class="login-title-block">
                <span class="login-school">Nueva Ecija University of Science and Technology</span>
                <span class="login-subtitle">Talavera Academic Extension Campus</span>
                <h1 class="login-system-title">Admin & Coordinator<br>Login Portal</h1>
            </div>
        </div>

        <div class="login-divider"></div>

        <!-- ROLE TABS -->
        <div class="role-tabs">
            <button class="role-tab active" data-role="admin" onclick="switchRole('admin', this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                Admin
            </button>
            <button class="role-tab" data-role="coordinator" onclick="switchRole('coordinator', this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Alumni Coordinator
            </button>
        </div>

        <!-- LOGIN FORM -->
        <form method="POST" action="/login-admin" id="loginForm">
            <input type="hidden" name="login_role" id="login_role" value="admin">

            {% if error %}
            <div class="error-message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <div class="field-group">
                <label class="field-label">Username</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" name="username" class="field-input" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Password</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" name="password" class="field-input" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                </svg>
                Login
            </button>

            <div class="register-link">
                Don't have an account? <a href="/createuser.html">Create Account</a>
            </div>
        </form>

    </div>
</div>

<script>
function switchRole(role, element) {
    // Remove active class from all tabs
    document.querySelectorAll('.role-tab').forEach(tab => {
        tab.classList.remove('active');
    });
    
    // Add active class to clicked tab
    element.classList.add('active');
    
    // Update hidden input
    document.getElementById('login_role').value = role;
}
</script>

</body>
</html>
